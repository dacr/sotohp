<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sotohp UI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header>
    <h1><img src="favicon.svg" alt="" width="20" height="20" style="vertical-align:middle;margin-right:8px">Sotohp</h1>
    <nav class="tabs">
      <button data-tab="viewer" class="active">Viewer</button>
      <button data-tab="mosaic">Mosaic</button>
      <button data-tab="events">Events</button>
      <button data-tab="portfolios">Portfolios</button>
      <button data-tab="map">Map</button>
      <button data-tab="persons">Persons</button>
      <button data-tab="owners">Owners</button>
      <button data-tab="stores">Stores</button>
      <button data-tab="settings">Settings</button>
      <button id="nav-logout" style="margin-left:auto;background:#ef4444;color:white;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;">Logout</button>
    </nav>
  </header>

  <main>
    <!-- Image Viewer Tab -->
    <section id="tab-viewer" class="tab active">
      <div class="viewer">
        <div class="image-container">
          <img id="main-image" alt="media"/>
        </div>
        <div class="sidebar">
          <div class="controls">
            <div class="row">
              <button id="btn-first" title="First">⏮️</button>
              <button id="btn-prev" title="Previous">◀️</button>
              <button id="btn-next" title="Next">▶️</button>
              <button id="btn-last" title="Last">⏭️</button>
            </div>
            <div class="row">
              <button id="btn-zoom-out" title="Zoom out (− / mouse wheel down)" aria-label="Zoom out">🔍−</button>
              <button id="btn-zoom-in" title="Zoom in (+ / mouse wheel up)" aria-label="Zoom in">🔍+</button>
              <button id="btn-zoom-reset" title="Reset zoom (0)" aria-label="Reset zoom"><span id="zoom-level">100%</span></button>
            </div>
            <div class="row">
              <button id="btn-fullscreen" title="Fullscreen">⛶</button>
              <button id="btn-star" title="Toggle starred">☆</button>
              <button id="btn-random" title="Random">🎲</button>
              <button id="btn-play" title="Play/Pause">▷</button>
              <button id="btn-faces" title="Show faces" aria-label="Show faces">🙂</button>
              <div class="ss-group">
                <div id="ss-duration" class="segmented" role="group" aria-label="Slideshow delay">
                  <button type="button" data-secs="10" title="10 seconds">10s</button>
                  <button type="button" data-secs="20" title="20 seconds">20s</button>
                  <button type="button" data-secs="30" title="30 seconds">30s</button>
                </div>
                <div id="ss-mode" class="segmented" role="group" aria-label="Slideshow mode">
                  <button type="button" data-mode="next" title="Next in order">▶️</button>
                  <button type="button" data-mode="random" title="Random">🎲</button>
                </div>
              </div>
            </div>
          </div>
          <div class="info">
            <div><strong>Date:</strong> <span id="info-date">-</span></div>
            <div><strong>Description:</strong> <span id="info-description">-</span></div>
            <div><strong>Event:</strong> <span id="info-event">-</span></div>
            <div><strong>Location:</strong> <span id="info-hasloc">-</span></div>
            <div><strong>Owner:</strong> <span id="info-owner">-</span></div>
            <div><strong>Camera:</strong> <span id="info-camera">-</span></div>
            <div><strong>Keywords:</strong> <span id="info-keywords">-</span></div>          </div>
        </div>
      </div>
    </section>

    <!-- Mosaic Tab -->
    <section id="tab-mosaic" class="tab">
      <div id="mosaic-scroll-indicator" class="mosaic-scroll-indicator"></div>
      
      <div class="mosaic-header">
         <span style="margin-right: 8px; font-size: 14px; color: #374151;">Size:</span>
         <div id="mosaic-size-ctl" class="segmented" role="group" aria-label="Mosaic size">
            <button type="button" data-size="small" title="Small thumbnails">Small</button>
            <button type="button" data-size="medium" title="Medium thumbnails">Medium</button>
            <button type="button" data-size="max" title="Large thumbnails" class="active">Large</button>
         </div>
      </div>

      <div class="mosaic-body">
        <div id="mosaic-timeline" class="mosaic-timeline" aria-label="Timeline" title="Click to jump to a time"></div>
        <div id="mosaic-container" class="mosaic-container"></div>
      </div>
    </section>

    <!-- Map Tab -->
    <section id="tab-map" class="tab">
      <div class="list-actions">
        <button id="refresh-map">↻ Refresh map</button>
      </div>
      <div id="map"></div>
      <div id="map-status" class="status"></div>
    </section>

    <!-- Persons Tab -->
    <section id="tab-persons" class="tab">
      <div class="list-actions">
        <button id="refresh-persons">↻ Refresh</button>
        <button id="create-person">＋ Create person</button>
        <button id="all-inferred-faces">All inferred faces</button>
        <span style="display:inline-flex;align-items:center;gap:4px;margin-left:8px;">
          <input id="persons-filter" type="text" placeholder="Quick filter…" aria-label="Quick filter" style="min-width:200px"/>
          <button id="reset-persons-filter" title="Clear filter" aria-label="Clear filter" style="background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;padding:4px 8px;cursor:pointer">×</button>
        </span>
      </div>
      <ul id="persons-list" class="list"></ul>
    </section>

    <!-- Events Tab -->
    <section id="tab-events" class="tab">
      <div class="list-actions">
        <button id="refresh-events">↻ Refresh</button>
        <button id="create-event">＋ Create event</button>
      </div>
      <ul id="events-list" class="list"></ul>
    </section>

    <!-- Portfolios Tab -->
    <section id="tab-portfolios" class="tab">
      <div id="portfolios-list-view">
        <div class="list-actions">
          <button id="refresh-portfolios">↻ Refresh</button>
          <button id="create-portfolio">＋ Create portfolio</button>
        </div>
        <ul id="portfolios-list" class="list"></ul>
      </div>
      <div id="portfolios-detail-view" style="display:none">
        <div class="list-actions">
          <button id="portfolio-back">← Back</button>
          <span id="portfolio-detail-title" style="font-weight:600;margin-left:8px"></span>
          <span style="flex:1"></span>
          <button id="portfolio-view">👁 View assets</button>
          <button id="portfolio-edit">✎ Edit</button>
          <button id="portfolio-delete" style="background:#ef4444;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer">🗑 Delete</button>
        </div>
        <p id="portfolio-detail-description" class="muted" style="margin:8px 4px"></p>
        <ul id="portfolio-assets-list" class="list"></ul>
      </div>
    </section>

    <!-- Owners Tab -->
    <section id="tab-owners" class="tab">
      <div class="list-actions">
        <button id="refresh-owners">↻ Refresh</button>
        <button id="create-owner">＋ Create owner</button>
      </div>
      <ul id="owners-list" class="list"></ul>
    </section>

    <!-- Stores Tab -->
    <section id="tab-stores" class="tab">
      <div class="list-actions">
        <button id="refresh-stores">↻ Refresh</button>
        <button id="create-store">＋ Create store</button>
      </div>
      <ul id="stores-list" class="list"></ul>
    </section>

    <!-- Settings Tab -->
    <section id="tab-settings" class="tab">
      <div class="settings-card">
        <h3>Synchronization</h3>
        <p class="muted">Keep your libraries up to date. You can run a quick sync that scans only recent additions, or a full sync over all stores.</p>
        <div class="settings-controls">
          <label class="checkbox">
            <input type="checkbox" id="sync-fast" checked>
            <span>Quick scan: only files added in the last</span>
          </label>
          <div class="inline-input">
            <input id="sync-days" list="sync-days-options" type="number" min="1" step="1" value="20" aria-label="Days" />
            <span class="suffix">days</span>
            <datalist id="sync-days-options">
              <option value="7"></option>
              <option value="20"></option>
              <option value="42"></option>
            </datalist>
          </div>
        </div>
        <div class="settings-actions">
          <button id="btn-sync" class="primary">▷ Synchronize</button>
        </div>
        <div id="sync-status" class="status"></div>
      </div>
    </section>
  </main>

  <!-- Vendor libraries -->
  <script src="https://unpkg.com/axios@1.7.7/dist/axios.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/keycloak-js@25.0.4/dist/keycloak.min.js"></script>
  <!-- App -->
  <script type="module" src="assets/js/app.js?v=48"></script>
</body>
</html>
